<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SENSI ELITE</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#071421;
    color:white;
}

/* TITULO */
h1{
    text-align:center;
    margin:20px;
}

/* GRID BOTONES */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.btn{
    background:#1c2b3a;
    padding:20px;
    border-radius:20px;
    text-align:center;
    font-size:18px;
}

/* PANEL OVERLAY */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

/* PANEL */
.panel{
    width:90%;
    max-width:400px;
    background:#102030;
    border-radius:20px;
    padding:20px;
}

.panel h2{
    margin-bottom:15px;
}

/* SLIDERS */
input[type=range]{
    width:100%;
}

/* BOTON */
.guardar{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#19a7ce;
    color:white;
    font-size:16px;
    margin-top:15px;
}
</style>
</head>

<body>

<h1>SENSI ELITE 🔥</h1>

<div class="grid">
    <div class="btn" onclick="abrirPanel()">🐉 Dragon Headshot</div>
    <div class="btn" onclick="abrirPanel()">😈 Demon Aimlock</div>
    <div class="btn" onclick="abrirPanel()">👻 Ghost Precision</div>
    <div class="btn" onclick="abrirPanel()">☠️ Toxic Destroyer</div>
</div>

<!-- PANEL -->
<div id="overlay" class="overlay" onclick="cerrarPanel(event)">
    <div class="panel">

        <h2>Ajustes de sensibilidad</h2>

        <p>General: <span id="g">173</span></p>
        <input type="range" min="0" max="200" value="173" oninput="g.innerText=this.value">

        <p>Punto rojo: <span id="p">147</span></p>
        <input type="range" min="0" max="200" value="147" oninput="p.innerText=this.value">

        <p>Mira 2x: <span id="m2">128</span></p>
        <input type="range" min="0" max="200" value="128" oninput="m2.innerText=this.value">

        <p>Mira 4x: <span id="m4">185</span></p>
        <input type="range" min="0" max="200" value="185" oninput="m4.innerText=this.value">

        <p>Mira Franco: <span id="mf">45</span></p>
        <input type="range" min="0" max="200" value="45" oninput="mf.innerText=this.value">

        <p>Cámara Libre: <span id="cl">0</span></p>
        <input type="range" min="0" max="200" value="0" oninput="cl.innerText=this.value">

        <button class="guardar">Guardar Configuración</button>

    </div>
</div>

<script>
function abrirPanel(){
    document.getElementById("overlay").style.display="flex";
}

function cerrarPanel(e){
    if(e.target.id === "overlay"){
        document.getElementById("overlay").style.display="none";
    }
}
</script>

</body>
</html>
