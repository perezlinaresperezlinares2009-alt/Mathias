<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SENSI ELITE</title>

<style>
body {
    background: #0b1220;
    color: white;
    font-family: Arial;
    text-align: center;
}

button {
    padding: 15px;
    margin: 10px;
    border-radius: 15px;
    border: none;
    background: #1e293b;
    color: white;
    width: 40%;
}

.card {
    margin-top: 20px;
    padding: 20px;
    background: #111827;
    border-radius: 15px;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<h1>SENSI ELITE 🔥</h1>

<!-- BOTONES -->
<button onclick="mostrar('dragon')">🐉 DRAGON HEADSHOT</button>
<button onclick="mostrar('demon')">😈 DEMON AIMLOCK</button>
<button onclick="mostrar('ghost')">👻 GHOST PRECISION</button>
<button onclick="mostrar('toxic')">☠️ TOXIC DESTROYER</button>

<!-- CONTENEDOR -->
<div id="contenido" class="card hidden"></div>

<script>
function mostrar(tipo) {
    let contenido = document.getElementById("contenido");

    let datos = {

        dragon: `
        <h2>🐉 DRAGON HEADSHOT</h2>
        General: 200<br>
        Red Dot: 71<br>
        2x: 169<br>
        4x: 105<br>
        Franco: 200<br>
        Cámara: 200<br>
        DPI: 351
        `,

        demon: `
        <h2>😈 DEMON AIMLOCK</h2>
        General: 174<br>
        Red Dot: 45<br>
        2x: 0<br>
        4x: 149<br>
        Franco: 137<br>
        Cámara: 200<br>
        DPI: 0
        `,

        ghost: `
        <h2>👻 GHOST PRECISION</h2>
        General: 146<br>
        Red Dot: 100<br>
        2x: 100<br>
        4x: 100<br>
        Franco: 100<br>
        Cámara: 100<br>
        DPI: 231
        `,

        toxic: `
        <h2>☠️ TOXIC DESTROYER</h2>
        General: 176<br>
        Red Dot: 166<br>
        2x: 168<br>
        4x: 73<br>
        Franco: 36<br>
        Cámara: 0<br>
        DPI: 440
        `
    };

    contenido.innerHTML = datos[tipo];
    contenido.classList.remove("hidden");
}
</script>

</body>
</html>
