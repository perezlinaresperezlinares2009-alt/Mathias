<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sensi Elite</title>

<style>
body {
    background: #0b1220;
    color: white;
    font-family: Arial;
    text-align: center;
    margin: 0;
}

/* BLOQUEAR SCROLL */
body.modal-abierto {
    overflow: hidden;
}

/* BOTONES */
.botones {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 20px;
}

button {
    padding: 20px;
    border-radius: 15px;
    border: none;
    background: #1e2a44;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* FONDO OSCURO */
.fondo {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 999;
}

.fondo.activo {
    display: block;
}

/* MODAL */
.sensi {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    width: 90%;
    max-width: 400px;
    max-height: 70vh;
    overflow-y: auto;

    background: #111a2e;
    padding: 20px;
    border-radius: 15px;

    box-shadow: 0 0 25px rgba(0,0,0,0.7);
    z-index: 1000;
}

.activo {
    display: block;
}

/* TITULO */
h1 {
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>SENSI ELITE 🔥</h1>

<div class="botones">
    <button onclick="mostrar('free')">Sensi Freestyle</button>
    <button onclick="mostrar('suprema')">Sensi Suprema</button>
    <button onclick="mostrar('lgang')">Sensibilidad L-Gang</button>
    <button onclick="mostrar('panel')">Sensi Panel</button>
</div>

<!-- FONDO -->
<div id="fondo" class="fondo" onclick="cerrar()"></div>

<!-- CONTENIDO -->

<div id="free" class="sensi">
    <h3>🔥 Freestyle</h3>
    <p>General: 180</p>
    <p>Punto rojo: 152</p>
    <p>Mira 2x: 200</p>
    <p>Mira 4x: 125</p>
</div>

<div id="suprema" class="sensi">
    <h3>🔥 Suprema</h3>
    <p>General: 176</p>
    <p>Punto rojo: 160</p>
    <p>Mira 2x: 190</p>
    <p>Mira 4x: 170</p>
</div>

<div id="lgang" class="sensi">
    <h3>🔥 L-Gang</h3>
    <p>Config aquí...</p>
</div>

<div id="panel" class="sensi">
    <h3>🔥 Panel</h3>
    <p>Config aquí...</p>
</div>

<script>
let actual = null;

function mostrar(id) {
    const fondo = document.getElementById("fondo");

    if (actual === id) {
        cerrar();
        return;
    }

    document.querySelectorAll('.sensi').forEach(div => {
        div.classList.remove('activo');
    });

    document.getElementById(id).classList.add('activo');
    fondo.classList.add('activo');
    document.body.classList.add('modal-abierto');

    actual = id;
}

function cerrar() {
    document.querySelectorAll('.sensi').forEach(div => {
        div.classList.remove('activo');
    });

    document.getElementById("fondo").classList.remove('activo');
    document.body.classList.remove('modal-abierto');

    actual = null;
}
</script>

</body>
</html>
