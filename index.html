<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GG SENSI</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(#071421,#0a2a3f);
    color:white;
}

.header{
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.sensi{
    margin-bottom:15px;
}

.sensi label{
    display:block;
    margin-bottom:5px;
}

.sensi input{
    width:100%;
}

/* BOTÓN */
.guardar-btn{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:linear-gradient(90deg,#00ffcc,#00ccff);
    border:none;
    border-radius:10px;
    color:black;
    font-size:16px;
    font-weight:bold;
}

/* GUARDADOS */
.guardados{
    margin-top:30px;
    background:#0f2a40;
    padding:15px;
    border-radius:10px;
}

.item{
    background:#123a55;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}
</style>

</head>
<body>

<div class="header">GG SENSI</div>

<div class="container">

    <!-- SENSIBILIDADES -->
    <div class="sensi">
        <label>General</label>
        <input type="range" id="general" min="0" max="100" value="50">
    </div>

    <div class="sensi">
        <label>Punto rojo</label>
        <input type="range" id="rojo" min="0" max="100" value="50">
    </div>

    <div class="sensi">
        <label>Mira 2x</label>
        <input type="range" id="mira2x" min="0" max="100" value="50">
    </div>

    <div class="sensi">
        <label>Mira 4x</label>
        <input type="range" id="mira4x" min="0" max="100" value="50">
    </div>

    <!-- BOTÓN -->
    <button class="guardar-btn" onclick="guardarSensi()">
        Guardar
    </button>

    <!-- LISTA GUARDADOS -->
    <div class="guardados">
        <h3>Guardados</h3>
        <div id="lista"></div>
    </div>

</div>

<script>
function guardarSensi(){
    let datos = {
        general: document.getElementById("general").value,
        rojo: document.getElementById("rojo").value,
        mira2x: document.getElementById("mira2x").value,
        mira4x: document.getElementById("mira4x").value
    };

    let guardados = JSON.parse(localStorage.getItem("sensis")) || [];
    guardados.push(datos);

    localStorage.setItem("sensis", JSON.stringify(guardados));

    mostrar();
}

function mostrar(){
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    let guardados = JSON.parse(localStorage.getItem("sensis")) || [];

    guardados.forEach(s => {
        let div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
        General: ${s.general} |
        Rojo: ${s.rojo} |
        2x: ${s.mira2x} |
        4x: ${s.mira4x}
        `;
        lista.appendChild(div);
    });
}

mostrar();
</script>

</body>
</html>
