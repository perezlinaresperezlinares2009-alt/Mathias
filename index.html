<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GG SENSI</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#071421;
    color:white;
}

h1{
    padding:15px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.btn{
    background:#1c2b3a;
    padding:15px;
    border-radius:20px;
    text-align:center;
}
</style>
</head>

<body>

<h1>GG SENSI 🔥</h1>

<div class="grid">
<div class="btn" onclick="mostrar('dragon')">🐉 Dragon</div>
<div class="btn" onclick="mostrar('demon')">😈 Demon</div>
<div class="btn" onclick="mostrar('ghost')">👻 Ghost</div>
<div class="btn" onclick="mostrar('toxic')">☠️ Toxic</div>

<div class="btn" onclick="mostrar('lgang')">🔥 L-Gang</div>
<div class="btn" onclick="mostrar('free')">🎯 Freestyle</div>

<div class="btn" onclick="mostrar('suprema')">⚡ Suprema</div>
<div class="btn" onclick="mostrar('panel')">🧠 Panel</div>

<div class="btn" onclick="mostrar('insana')">👹 Insana</div>
<div class="btn" onclick="mostrar('moto')">📱 Motorola</div>

<div class="btn" onclick="mostrar('hz')">⚙️ HZ</div>
<div class="btn" onclick="mostrar('xiaomi')">➡️ Xiaomi</div>

<div class="btn" onclick="mostrar('p90')">🔫 P90</div>
</div>

<script>

function mostrar(tipo){

let configs = {
dragon:[173,147,128,185,45,0],
demon:[160,140,120,170,50,10],
ghost:[180,150,130,190,40,5],
toxic:[165,135,125,175,60,15],
lgang:[170,145,135,180,55,10],
free:[175,155,140,185,50,5],
suprema:[190,160,150,200,60,20],
panel:[150,130,110,160,45,0],
insana:[185,165,145,195,55,10],
moto:[140,120,100,150,40,0],
hz:[155,135,115,165,50,5],
xiaomi:[145,125,105,155,45,0],
p90:[200,180,160,200,70,20]
};

let c = configs[tipo];
let codigo = c.join("-");

alert(
"🔥 SENSI + CODIGO 🔥\n\n" +
"General: " + c[0] + "\n" +
"Punto rojo: " + c[1] + "\n" +
"Mira 2x: " + c[2] + "\n" +
"Mira 4x: " + c[3] + "\n" +
"Mira Franco: " + c[4] + "\n" +
"Cámara Libre: " + c[5] + "\n\n" +
"📋 Código: " + codigo
);

}

</script>

</body>
</html>
