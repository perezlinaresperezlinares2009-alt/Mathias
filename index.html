<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GG SENSI</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(#071421,#0b1f33);
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

/* TOP MENU */
.top{
    display:flex;
    gap:10px;
    padding:10px;
}

.top div{
    padding:10px 15px;
    border-radius:20px;
    background:#1c2b3a;
    cursor:pointer;
}

.activo{
    background:#19a7ce !important;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.btn{
    background:#1c2b3a;
    padding:20px;
    border-radius:20px;
    text-align:center;
    font-size:16px;
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.05);
}

/* LOADING */
.loading{
    display:none;
    text-align:center;
    margin-top:100px;
}

/* OVERLAY */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

/* PANEL */
.panel{
    width:90%;
    max-width:400px;
    background:#102030;
    border-radius:20px;
    padding:20px;
    animation:fade 0.3s;
}

@keyframes fade{
    from{transform:scale(0.8);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

input{
    width:100%;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#19a7ce;
    color:white;
    margin-top:10px;
}

/* BOTON + */
.fab{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#19a7ce;
    width:60px;
    height:60px;
    border-radius:50%;
    font-size:30px;
    display:flex;
    justify-content:center;
    align-items:center;
}
</style>
</head>

<body>

<div class="header">GG SENSI 🔥</div>

<!-- MENU -->
<div class="top">
<div class="activo" onclick="cambiar('top')">🔥 Top</div>
<div onclick="cambiar('guardados')">💾 Guardados</div>
<div onclick="cambiar('vip')">👑 VIP</div>
</div>

<!-- CONTENIDO -->
<div id="top" class="grid">
<div class="btn" onclick="abrirPanel('dragon')">🐉 Dragon</div>
<div class="btn" onclick="abrirPanel('demon')">😈 Demon</div>
<div class="btn" onclick="abrirPanel('ghost')">👻 Ghost</div>
<div class="btn" onclick="abrirPanel('toxic')">☠️ Toxic</div>
</div>

<div id="guardados" class="grid" style="display:none"></div>

<div id="vip" class="grid" style="display:none">
<div class="btn" onclick="abrirPanel('insana')">👹 Insana VIP</div>
<div class="btn" onclick="abrirPanel('suprema')">⚡ Suprema VIP</div>
</div>

<!-- LOADING -->
<div class="loading" id="loading">
<h2>Cargando configuración...</h2>
</div>

<!-- PANEL -->
<div id="overlay" class="overlay" onclick="cerrarPanel(event)">
<div class="panel">

<h2>Ajustes GG</h2>

<p>General: <span id="g"></span></p>
<input type="range" min="0" max="200" oninput="g.innerText=this.value">

<p>Punto rojo: <span id="p"></span></p>
<input type="range" min="0" max="200" oninput="p.innerText=this.value">

<p>Mira 2x: <span id="m2"></span></p>
<input type="range" min="0" max="200" oninput="m2.innerText=this.value">

<p>Mira 4x: <span id="m4"></span></p>
<input type="range" min="0" max="200" oninput="m4.innerText=this.value">

<p>Mira Franco: <span id="mf"></span></p>
<input type="range" min="0" max="200" oninput="mf.innerText=this.value">

<p>Cámara Libre: <span id="cl"></span></p>
<input type="range" min="0" max="200" oninput="cl.innerText=this.value">

<button onclick="guardar()">💾 Guardar</button>

</div>
</div>

<!-- BOTON + -->
<div class="fab" onclick="alert('Próximamente crear tu propia sensi 😎')">+</div>

<script>

const configs = {
dragon:[173,147,128,185,45,0],
demon:[160,140,120,170,50,10],
ghost:[180,150,130,190,40,5],
toxic:[165,135,125,175,60,15],
insana:[185,165,145,195,55,10],
suprema:[190,160,150,200,60,20]
};

let actual="";

// ABRIR PANEL
function abrirPanel(tipo){
actual=tipo;

loading.style.display="block";

setTimeout(()=>{
loading.style.display="none";

let c=configs[tipo];
let s=document.querySelectorAll("input");

g.innerText=c[0]; s[0].value=c[0];
p.innerText=c[1]; s[1].value=c[1];
m2.innerText=c[2]; s[2].value=c[2];
m4.innerText=c[3]; s[3].value=c[3];
mf.innerText=c[4]; s[4].value=c[4];
cl.innerText=c[5]; s[5].value=c[5];

overlay.style.display="flex";

},800);
}

// GUARDAR
function guardar(){
let data = JSON.parse(localStorage.getItem("ggsensi")) || [];
data.push(actual);
localStorage.setItem("ggsensi", JSON.stringify(data));
alert("Guardado en GG SENSI 🔥");
}

// CAMBIAR TAB
function cambiar(tab){
document.querySelectorAll(".grid").forEach(e=>e.style.display="none");
document.getElementById(tab).style.display="grid";

if(tab==="guardados"){
let data = JSON.parse(localStorage.getItem("ggsensi")) || [];
let cont = document.getElementById("guardados");
cont.innerHTML="";

data.forEach(s=>{
cont.innerHTML+=`<div class="btn" onclick="abrirPanel('${s}')">⭐ ${s}</div>`;
});
}
}

// CERRAR
function cerrarPanel(e){
if(e.target.id==="overlay"){
overlay.style.display="none";
}
}

</script>

</body>
</html>
