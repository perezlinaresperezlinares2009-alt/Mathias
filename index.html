<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sensi Elite</title>

<style>
body {
    background: #0b1220;
    color: white;
    font-family: Arial;
    margin: 0;
}

/* CONTENIDO PRINCIPAL */
.container {
    padding: 20px;
}

h1 {
    margin-bottom: 15px;
}

/* BUSCADOR */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 20px;
}

/* BOTONES */
.botones {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

button {
    padding: 20px;
    border-radius: 15px;
    border: none;
    background: #1e2a44;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* FONDO OSCURO */
.fondo {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 999;
}

/* MODAL */
.sensi {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    width: 90%;
    max-width: 400px;
    max-height: 70vh;
    overflow-y: auto;

    background: #111a2e;
    padding: 20px;
    border-radius: 15px;

    z-index: 1000;
}

/* ACTIVAR */
.activo {
    display: block;
}
</style>
</head>

<body>

<div class="container">
    <h1>SENSI ELITE 🔥</h1>

    <input type="text" placeholder="Buscar...">

    <div class="botones">
        <button onclick="mostrar('free')">Sensi Freestyle</button>
        <button onclick="mostrar('suprema')">Sensi Suprema</button>
        <button onclick="mostrar('lgang')">Sensibilidad L-Gang</button>
        <button onclick="mostrar('panel')">Sensi Panel</button>
    </div>
</div>

<!-- FONDO -->
<div id="fondo" class="fondo" onclick="cerrar()"></div>

<!-- MODALES -->
<div id="free" class="sensi">
    <h3>🔥 Freestyle</h3>
    <p>General: 180</p>
    <p>Punto rojo: 152</p>
    <p>Mira 2x: 200</p>
    <p>Mira 4x: 125</p>
</div>

<div id="suprema" class="sensi">
    <h3>🔥 Suprema</h3>
    <p>General: 176</p>
    <p>Punto rojo: 160</p>
    <p>Mira 2x: 190</p>
    <p>Mira 4x: 170</p>
</div>

<div id="lgang" class="sensi">
    <h3>🔥 L-Gang</h3>
    <p>Config aquí...</p>
</div>

<div id="panel" class="sensi">
    <h3>🔥 Panel</h3>
    <p>Config aquí...</p>
</div>

<script>
function mostrar(id) {
    document.querySelectorAll('.sensi').forEach(div => {
        div.style.display = 'none';
    });

    document.getElementById(id).style.display = 'block';
    document.getElementById("fondo").style.display = 'block';
}

function cerrar() {
    document.querySelectorAll('.sensi').forEach(div => {
        div.style.display = 'none';
    });

    document.getElementById("fondo").style.display = 'none';
}
</script>

</body>
</html>
