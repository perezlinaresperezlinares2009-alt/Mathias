<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GG SENSI</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(#071421,#0a2a3f);
    color:white;
}

.header{
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.sensi{
    margin-bottom:15px;
}

.sensi input{
    width:100%;
}

/* BOTÓN */
.btn{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00ffcc,#00ccff);
    font-weight:bold;
}

/* GUARDADOS */
.guardados{
    margin-top:20px;
    background:#0f2a40;
    padding:10px;
    border-radius:10px;
}

.item{
    background:#123a55;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

/* VIP */
.vip{
    margin-top:30px;
    background:#111;
    padding:15px;
    border-radius:10px;
}

.vip input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

.hidden{
    display:none;
}
</style>

</head>
<body>

<div class="header">GG SENSI 🔥</div>

<div class="container">

<!-- SENSIBILIDADES -->
<div class="sensi"><label>General</label><input type="range" id="general" value="80"></div>
<div class="sensi"><label>Punto rojo</label><input type="range" id="rojo" value="90"></div>
<div class="sensi"><label>Mira 2x</label><input type="range" id="mira2x" value="85"></div>
<div class="sensi"><label>Mira 4x</label><input type="range" id="mira4x" value="80"></div>
<div class="sensi"><label>AWM</label><input type="range" id="awm" value="70"></div>
<div class="sensi"><label>Mirilla libre</label><input type="range" id="libre" value="95"></div>

<!-- BOTÓN GUARDAR -->
<button class="btn" onclick="guardar()">Guardar</button>

<!-- GUARDADOS -->
<div class="guardados">
    <h3>Guardados</h3>
    <div id="lista"></div>
</div>

<!-- ZONA VIP -->
<div class="vip">
    <h3>Zona VIP 🔒</h3>
    <input type="password" id="pass" placeholder="Contraseña">
    <button class="btn" onclick="entrarVIP()">Entrar</button>

    <div id="vipContenido" class="hidden">
        <h4>Sensis PRO 🔥</h4>
        <p>General: 100 | Rojo: 100 | 2x: 95 | 4x: 90 | AWM: 80 | Libre: 100</p>
    </div>
</div>

</div>

<script>

// GUARDAR SENSI
function guardar(){
    let datos = {
        general: general.value,
        rojo: rojo.value,
        mira2x: mira2x.value,
        mira4x: mira4x.value,
        awm: awm.value,
        libre: libre.value
    };

    let lista = JSON.parse(localStorage.getItem("sensis")) || [];
    lista.push(datos);

    localStorage.setItem("sensis", JSON.stringify(lista));

    mostrar();
}

// MOSTRAR GUARDADOS
function mostrar(){
    let cont = document.getElementById("lista");
    cont.innerHTML = "";

    let lista = JSON.parse(localStorage.getItem("sensis")) || [];

    lista.forEach(s=>{
        let div = document.createElement("div");
        div.className="item";
        div.innerHTML = `
        G:${s.general} | R:${s.rojo} | 2x:${s.mira2x} | 4x:${s.mira4x} | AWM:${s.awm} | L:${s.libre}
        `;
        cont.appendChild(div);
    });
}

mostrar();

// VIP CON INTENTOS INFINITOS
function entrarVIP(){
    let pass = document.getElementById("pass").value;

    if(pass === "44400978"){
        document.getElementById("vipContenido").classList.remove("hidden");
        localStorage.setItem("vip","true");
        alert("Acceso VIP concedido 🔥");
    } else {
        alert("Contraseña incorrecta ❌");
        // intentos infinitos (no hay límite)
    }
}

// MANTENER VIP ABIERTO
if(localStorage.getItem("vip") === "true"){
    document.getElementById("vipContenido").classList.remove("hidden");
}

</script>

</body>
</html>
