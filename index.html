<script>
let actual = null;

function mostrar(id) {
    const seleccionado = document.getElementById(id);

    // Si ya está abierto, lo cerramos
    if (actual === id) {
        seleccionado.classList.remove('activo');
        actual = null;
        return;
    }

    // Ocultar todos
    document.querySelectorAll('.sensi').forEach(div => {
        div.classList.remove('activo');
    });

    // Mostrar el nuevo
    seleccionado.classList.add('activo');
    actual = id;
}
</script>
