<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GG SENSI</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#071421;
    color:white;
}

h1{
    padding:15px;
}

/* MENU */
.menu{
    display:flex;
    gap:10px;
    padding:10px;
}

.menu button{
    padding:10px;
    border:none;
    border-radius:15px;
    background:#1c2b3a;
    color:white;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.btn{
    background:#1c2b3a;
    padding:15px;
    border-radius:20px;
    text-align:center;
}
</style>
</head>

<body>

<h1>GG SENSI 🔥</h1>

<!-- MENU -->
<div class="menu">
<button onclick="mostrarSeccion('top')">🔥 Top</button>
<button onclick="mostrarSeccion('guardados')">💾 Guardados</button>
<button onclick="verVIP()">👑 VIP</button>
</div>

<!-- CONTENIDO -->
<div id="contenido" class="grid"></div>

<script>

const PASSWORD = "44400978";

// CONFIGURACIONES
const configs = {
dragon:[173,147,128,185,45,0],
demon:[160,140,120,170,50,10],
ghost:[180,150,130,190,40,5],
toxic:[165,135,125,175,60,15],
lgang:[170,145,135,180,55,10],
free:[175,155,140,185,50,5],
suprema:[190,160,150,200,60,20],
panel:[150,130,110,160,45,0],
insana:[185,165,145,195,55,10],
moto:[140,120,100,150,40,0],
hz:[155,135,115,165,50,5],
xiaomi:[145,125,105,155,45,0],
p90:[200,180,160,200,70,20]
};

// MOSTRAR SECCION
function mostrarSeccion(tipo){
let cont = document.getElementById("contenido");
cont.innerHTML = "";

let lista = [];

if(tipo === "top"){
lista = ["dragon","demon","ghost","toxic"];
}

if(tipo === "guardados"){
lista = JSON.parse(localStorage.getItem("guardados")) || [];
}

lista.forEach(n => {
cont.innerHTML += `
<div class="btn" onclick="mostrar('${n}')">
${n.toUpperCase()}
</div>
`;
});
}

// VIP CON 3 INTENTOS
function verVIP(){

let hoy = new Date().toLocaleDateString();

let data = JSON.parse(localStorage.getItem("vipIntentos")) || {
fecha: hoy,
intentos: 0
};

if(data.fecha !== hoy){
data.fecha = hoy;
data.intentos = 0;
}

if(data.intentos >= 3){
alert("❌ Has agotado tus 3 intentos por hoy");
return;
}

let input = prompt("🔒 Contraseña VIP:");

if(input === PASSWORD){

data.intentos = 0;
localStorage.setItem("vipIntentos", JSON.stringify(data));

let cont = document.getElementById("contenido");
cont.innerHTML = "";

let lista = ["lgang","free","suprema","panel","insana","moto","hz","xiaomi","p90"];

lista.forEach(n => {
cont.innerHTML += `
<div class="btn" onclick="mostrar('${n}')">
${n.toUpperCase()}
</div>
`;
});

}else{

data.intentos++;
localStorage.setItem("vipIntentos", JSON.stringify(data));

let restantes = 3 - data.intentos;

alert("❌ Contraseña incorrecta\nIntentos restantes: " + restantes);
}

}

// MOSTRAR SENSI
function mostrar(tipo){

let c = configs[tipo];
let codigo = c.join("-");

let guardar = confirm(
"🔥 SENSI 🔥\n\n" +
"General: " + c[0] + "\n" +
"Punto rojo: " + c[1] + "\n" +
"Mira 2x: " + c[2] + "\n" +
"Mira 4x: " + c[3] + "\n" +
"Mira Franco: " + c[4] + "\n" +
"Cámara Libre: " + c[5] + "\n\n" +
"📋 Código: " + codigo + "\n\n" +
"¿Guardar en favoritos?"
);

if(guardar){
let guardados = JSON.parse(localStorage.getItem("guardados")) || [];

if(!guardados.includes(tipo)){
guardados.push(tipo);
localStorage.setItem("guardados", JSON.stringify(guardados));
alert("✅ Guardado");
}
}

}

// INICIO
mostrarSeccion('top');

</script>

</body>
</html>
