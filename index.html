<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensi Elite PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
}

/* HEADER */
.header {
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}

/* BUSCADOR */
.search {
    margin: 10px 20px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    width: calc(100% - 40px);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    font-weight: bold;
}

/* LINK INVISIBLE */
.card a {
    text-decoration: none;
    color: white;
    display: block;
}

/* SECCIÓN SENSI */
.sensi {
    padding: 20px;
}

.title a {
    text-decoration: none;
    color: white;
}

.title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 20px;
}

/* ITEMS */
.item {
    margin-bottom: 18px;
}

.label {
    font-size: 13px;
    color: #aaa;
}

.bar {
    width: 100%;
    height: 6px;
    background: #333;
    border-radius: 10px;
    margin-top: 5px;
}

.fill {
    height: 100%;
    background: #00e0ff;
    border-radius: 10px;
}

.value {
    float: right;
    margin-top: -18px;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="header">SENSI ELITE 🔥</div>

<input class="search" placeholder="Buscar...">

<div class="grid">
    <div class="card">
        <a href="https://link1.com">Sensi Freestyle</a>
    </div>

    <div class="card">Sensi Suprema</div>

    <div class="card">Sensibilidad L-Gang</div>

    <!-- LINK INVISIBLE EN SENSI PANEL -->
    <div class="card">
        <a href="https://link2.com">Sensi Panel</a>
    </div>
</div>

<!-- SECCIÓN FREESTYLE -->
<div class="sensi">
    <div class="title">
        🔥 <a href="https://link1.com">Sensi Freestyle</a>
    </div>

    <div class="item">
        <div class="label">General</div>
        <div class="bar"><div class="fill" style="width:90%"></div></div>
        <div class="value">180</div>
    </div>

    <div class="item">
        <div class="label">Punto rojo</div>
        <div class="bar"><div class="fill" style="width:75%"></div></div>
        <div class="value">152</div>
    </div>

    <div class="item">
        <div class="label">Mira 2x</div>
        <div class="bar"><div class="fill" style="width:100%"></div></div>
        <div class="value">200</div>
    </div>

    <div class="item">
        <div class="label">Mira 4x</div>
        <div class="bar"><div class="fill" style="width:62%"></div></div>
        <div class="value">125</div>
    </div>

    <div class="item">
        <div class="label">Mira francotirador</div>
        <div class="bar"><div class="fill" style="width:0%"></div></div>
        <div class="value">0</div>
    </div>

    <div class="item">
        <div class="label">Free Camera</div>
        <div class="bar"><div class="fill" style="width:1%"></div></div>
        <div class="value">1</div>
    </div>
</div>

<!-- SECCIÓN PANEL (NUEVA ABAJO) -->
<div class="sensi">
    <div class="title">
        🔥 <a href="https://link2.com">Sensi Panel</a>
    </div>

    <div class="item">
        <div class="label">General</div>
        <div class="bar"><div class="fill" style="width:88%"></div></div>
        <div class="value">176</div>
    </div>

    <div class="item">
        <div class="label">Punto rojo</div>
        <div class="bar"><div class="fill" style="width:80%"></div></div>
        <div class="value">160</div>
    </div>

    <div class="item">
        <div class="label">Mira 2x</div>
        <div class="bar"><div class="fill" style="width:95%"></div></div>
        <div class="value">190</div>
    </div>

    <div class="item">
        <div class="label">Mira 4x</div>
        <div class="bar"><div class="fill" style="width:85%"></div></div>
        <div class="value">170</div>
    </div>

    <div class="item">
        <div class="label">Mira francotirador</div>
        <div class="bar"><div class="fill" style="width:70%"></div></div>
        <div class="value">140</div>
    </div>

    <div class="item">
        <div class="label">Free Camera</div>
        <div class="bar"><div class="fill" style="width:90%"></div></div>
        <div class="value">180</div>
    </div>
</div>

</body>
</html>
